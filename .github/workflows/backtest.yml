name: backtest

# اختبار تاريخي يدوي للاستراتيجية. يُشغَّل من تبويب Actions بزر "Run workflow".
# يطبع التقرير في سجل التشغيل، يرسله إلى تيليجرام، ويرفع ملف CSV كأثر (artifact).
on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "الاستراتيجية"
        type: choice
        options: [rsi80, score, reversal, osmulti, osob, trendwave]
        default: rsi80
      os_touches:
        description: "(osmulti) عدد نزولات التشبّع البيعي: 15m=3 / 1h=2"
        default: "2"
      trend_filter:
        description: "(osob) فلتر اتجاه: دخول فقط فوق متوسط 200"
        type: choice
        options: ["off", "on"]
        default: "off"
      trail_buf:
        description: "(osob) مسافة الوقف المتحرك ×ATR (0.25/0.5/1.0)"
        default: "0.25"
      trail_arm:
        description: "(osob) تأجيل التتبّع حتى ربح ×المخاطرة (0=فوري/1.0)"
        default: "0.0"
      assets:
        description: "الأصول"
        type: choice
        options: [crypto, stocks, all]
        default: crypto
      rsi_ob:
        description: "عتبة RSI للزخم (rsi80): 70/75/80"
        default: "70"
      bt_stop_mult:
        description: "مضاعف وقف ATR (rsi80): 1.5/2.0/2.5"
        default: "2.0"
      timeframe:
        description: "الإطار الزمني"
        type: choice
        options: ["1d", "4h", "1h", "15m"]
        default: "1d"
      min_score:
        description: "الحد الأدنى للدرجة"
        default: "51"
      bt_bars:
        description: "عدد الشموع للاختبار"
        default: "365"
      bt_hold:
        description: "أقصى شموع لإمساك الصفقة"
        default: "40"
      cost:
        description: "تكلفة الصفقة ذهاب/إياب (0.002 = 0.2%)"
        default: "0.002"
      market_filter:
        description: "فلتر اتجاه السوق (BTC/SPY)"
        type: choice
        options: ["on", "off"]
        default: "off"
      supply_demand:
        description: "شرط مناطق العرض/الطلب"
        type: choice
        options: ["on", "off"]
        default: "off"
      vwap_daily:
        description: "شرط VWAP اليومي (لـ 4h/1h فقط)"
        type: choice
        options: ["on", "off"]
        default: "off"
      vwap_weekly:
        description: "شرط VWAP الأسبوعي"
        type: choice
        options: ["on", "off"]
        default: "on"
      vwap_monthly:
        description: "شرط VWAP الشهري"
        type: choice
        options: ["on", "off"]
        default: "on"

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run backtest
        run: |
          set -o pipefail
          FLAGS=""
          if [ "${{ inputs.strategy }}" = "rsi80" ]; then
            FLAGS="$FLAGS --rsi-cross --rsi-ob ${{ inputs.rsi_ob }} --bt-stop-mult ${{ inputs.bt_stop_mult }}"
          elif [ "${{ inputs.strategy }}" = "reversal" ]; then
            FLAGS="$FLAGS --strategy reversal"
          elif [ "${{ inputs.strategy }}" = "osmulti" ]; then
            FLAGS="$FLAGS --os-multi --os-touches ${{ inputs.os_touches }} --rsi-os 20 --rsi-ob 80"
          elif [ "${{ inputs.strategy }}" = "osob" ]; then
            FLAGS="$FLAGS --osob --rsi-os 20 --rsi-ob 80 --trail-buf ${{ inputs.trail_buf }} --trail-arm ${{ inputs.trail_arm }}"
            if [ "${{ inputs.trend_filter }}" = "on" ]; then FLAGS="$FLAGS --trend-filter"; fi
          elif [ "${{ inputs.strategy }}" = "trendwave" ]; then
            FLAGS="$FLAGS --trendwave"
          fi
          if [ "${{ inputs.market_filter }}" = "on" ]; then FLAGS="$FLAGS --market-filter"; fi
          if [ "${{ inputs.supply_demand }}" = "on" ]; then FLAGS="$FLAGS --supply-demand"; fi
          if [ "${{ inputs.vwap_daily }}" = "on" ]; then FLAGS="$FLAGS --vwap-daily"; fi
          if [ "${{ inputs.vwap_weekly }}" = "on" ]; then FLAGS="$FLAGS --vwap-weekly"; fi
          if [ "${{ inputs.vwap_monthly }}" = "on" ]; then FLAGS="$FLAGS --vwap-monthly"; fi
          python trading_bot.py --mode backtest \
            --watchlist watchlist.txt \
            --assets "${{ inputs.assets }}" \
            --timeframe "${{ inputs.timeframe }}" \
            --min-score "${{ inputs.min_score }}" \
            --bt-bars "${{ inputs.bt_bars }}" \
            --bt-hold "${{ inputs.bt_hold }}" \
            --cost "${{ inputs.cost }}" \
            $FLAGS \
            --output-dir . 2>&1 | tee backtest_log.txt

      - name: Send report to Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_TOKEN" ] && [ -f backtest_log.txt ]; then
            PREFIX=$'📊 نتائج الاختبار التاريخي (Backtest)\n\n'
            BODY=$(tail -c 3500 backtest_log.txt)
            curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${PREFIX}${BODY}" \
              --data "disable_web_page_preview=true" >/dev/null || true
          fi

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_*.csv
            backtest_log.txt
          if-no-files-found: ignore
