name: SD Bot (AI Supply/Demand signals)

on:
  workflow_dispatch:          # تشغيل يدوي
  schedule:
    - cron: "7 * * * *"       # كل ساعة (الدقيقة 7 لتفادي ازدحام رأس الساعة)

permissions:
  contents: write             # للسماح بحفظ حالة منع التكرار

concurrency:
  group: sd-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests scikit-learn joblib

      - name: Run SD bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sd_bot.py

      - name: Persist model + dedup state + tracked signals
        run: |
          # tracked_signals.json مشترك مع reversal.yml: نضيف إشاراتنا فقط، ونعيد
          # المزامنة بـ rebase لتفادي التعارض مع تشغيل المتابعة المتزامن.
          for f in sd_state.json sd_model.joblib tracked_signals.json; do
            [ -f "$f" ] && git add "$f"
          done
          if ! git diff --cached --quiet; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git commit -m "update sd state + tracked signals [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi
