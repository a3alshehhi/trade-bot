name: trade-bot

# المواعيد بتوقيت UTC. الإمارات = UTC+4
# 04:17 UTC = 08:17 الإمارات <- بحث كريبتو (يومي + 4 ساعات + ساعة)
# 12:17 UTC = 16:17 الإمارات <- بحث أسهم (1d)
# كل ساعتين (الدقيقة 37) <- متابعة الصفقات المفتوحة
# 21:30 UTC -> اختراق المتوسط السنوي (بعد إغلاق السوق)
# تُجنّب رأس الساعة (ذروة GitHub): الجدولة عند الدقائق 17/37/30
on:
  schedule:
    - cron: '17 4 * * *'
    - cron: '17 12 * * *'
    - cron: '37 */2 * * *'
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

# يمنع تصادم تشغيلين متزامنين عند حفظ الحالة: التشغيلات تصطفّ بدل أن تتزامن
concurrency:
  group: trade-bot-state
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          S="${{ github.event.schedule }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for TF in 1d 4h 1h; do
              python trading_bot.py --watchlist watchlist.txt --assets crypto --timeframe $TF --side buy --dca --min-score 51
            done
          elif [ "$S" = "17 4 * * *" ]; then
            for TF in 1d 4h 1h; do
              python trading_bot.py --watchlist watchlist.txt --assets crypto --timeframe $TF --side buy --dca --min-score 51
            done
          elif [ "$S" = "17 12 * * *" ]; then
            python trading_bot.py --watchlist watchlist.txt --assets stocks --timeframe 1d --side buy --dca --min-score 51
          elif [ "$S" = "30 21 * * *" ]; then
            python trading_bot.py --mode yearly --watchlist watchlist.txt
          else
            python trading_bot.py --mode monitor
          fi

      - name: Persist state
        run: |
          for f in open_trades.json yearly_cross.json; do
            [ -f "$f" ] && git add "$f"
          done
          if ! git diff --cached --quiet; then
            git config user.name "trade-bot"
            git config user.email "bot@users.noreply.github.com"
            git commit -m "update bot state [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi
