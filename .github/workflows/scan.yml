name: trade-bot

# المواعيد بتوقيت UTC. الإمارات = UTC+4
# 04:00 UTC = 08:00 الإمارات -> بحث كريبتو على الفريمات: يومي + 4 ساعات + ساعة
# 12:00 UTC = 16:00 الإمارات -> بحث أسهم (1d)
# كل ساعة -> متابعة الصفقات المفتوحة
# 21:30 UTC -> تنبيه اختراق المتوسط السنوي (بعد إغلاق السوق)
on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 12 * * *'
    - cron: '0 * * * *'
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          S="${{ github.event.schedule }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for TF in 1d 4h 1h; do
              python trading_bot.py --watchlist watchlist.txt --assets crypto --timeframe $TF --side buy --dca
            done
          elif [ "$S" = "0 4 * * *" ]; then
            for TF in 1d 4h 1h; do
              python trading_bot.py --watchlist watchlist.txt --assets crypto --timeframe $TF --side buy --dca
            done
          elif [ "$S" = "0 12 * * *" ]; then
            python trading_bot.py --watchlist watchlist.txt --assets stocks --timeframe 1d --side buy --dca
          elif [ "$S" = "30 21 * * *" ]; then
            python trading_bot.py --mode yearly --watchlist watchlist.txt
          else
            python trading_bot.py --mode monitor
          fi

      - name: Persist state
        run: |
          for f in open_trades.json yearly_cross.json; do
            [ -f "$f" ] && git add "$f"
          done
          if ! git diff --cached --quiet; then
            git config user.name "trade-bot"
            git config user.email "bot@users.noreply.github.com"
            git commit -m "update bot state [skip ci]"
            git push
          fi
