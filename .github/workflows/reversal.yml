name: reversal-live

# تنبيه حيّ لاستراتيجيات الانعكاس على تيليجرام، فور إغلاق الشمعة.
# كل 15 دقيقة (دقائق 8/23/38/53 لتجنّب ذروة GitHub عند رأس الساعة).
# يشمل: زخم RSI70 (15m/1h/4h/1d) + استراتيجية trendwave المستقلة (15m/1h/4h).
# هذا هو الوركفلو الذي يشغّله cron-job.org، فإضافة trendwave هنا تربطه بالجدولة تلقائياً.
on:
  schedule:
    - cron: '8,23,38,53 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# يمنع تصادم تشغيلين عند حفظ حالة منع التكرار
concurrency:
  group: reversal-state
  cancel-in-progress: false

jobs:
  reversal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run live reversal scans
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # إشارة شراء بالزخم: فور تجاوز RSI(21) خط الـ70 — على 4 فريمات
          # --ml-filter: يرشّح الإشارات بالفلتر التعلّمي إن وُجد ml_model.joblib (وإلا يمرّر الكل)
          python trading_bot.py --mode reversal --rsi-cross --rsi-ob 70 --ml-filter --watchlist watchlist.txt \
            --timeframe 15m --state reversal_alerts.json
          python trading_bot.py --mode reversal --rsi-cross --rsi-ob 70 --ml-filter --watchlist watchlist.txt \
            --timeframe 1h --state reversal_alerts.json
          python trading_bot.py --mode reversal --rsi-cross --rsi-ob 70 --ml-filter --watchlist watchlist.txt \
            --timeframe 4h --state reversal_alerts.json
          python trading_bot.py --mode reversal --rsi-cross --rsi-ob 70 --ml-filter --watchlist watchlist.txt \
            --timeframe 1d --state reversal_alerts.json
          # === استراتيجية trendwave المستقلة (الإعداد الرابح) — على نفس الجدول ===
          # دخول مباشر بعد موجة RSI(20→80) + فلتر اتجاه من فريم أعلى. رسائل مُعنونة "trendwave".
          python trading_bot.py --mode reversal --trendwave --ml-filter --watchlist watchlist.txt \
            --timeframe 15m --state trendwave_alerts.json
          python trading_bot.py --mode reversal --trendwave --ml-filter --watchlist watchlist.txt \
            --timeframe 1h --state trendwave_alerts.json
          python trading_bot.py --mode reversal --trendwave --ml-filter --watchlist watchlist.txt \
            --timeframe 4h --state trendwave_alerts.json
          # متابعة الإشارات المُرسَلة والرد على رسالتها عند بلوغ هدف/وقف
          python trading_bot.py --mode trackmon

      - name: Paper trades — capture taps & monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # تسجيل كل الإشارات الجديدة تلقائياً كصفقات ورقية (بلا ضغط زر)
          python paper.py auto
          # التقاط ضغطات زر "افتح صفقة ورقية" وأوامر /report و/trades
          python paper.py poll
          # متابعة الصفقات المفتوحة وإغلاقها عند الهدف/الوقف + تحديث نسخة اللوحة
          python paper.py monitor

      - name: Persist alert & paper state
        run: |
          for f in reversal_alerts.json trendwave_alerts.json pending_signals.json tracked_signals.json \
                   paper_trades.json tg_offset.json paper_data.json; do
            [ -f "$f" ] && git add "$f"
          done
          if ! git diff --cached --quiet; then
            git config user.name "trade-bot"
            git config user.email "bot@users.noreply.github.com"
            git commit -m "update reversal + paper trades [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi
